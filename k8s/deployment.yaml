apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-card-app
  labels:
    app: health-card-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: health-card-app
  template:
    metadata:
      labels:
        app: health-card-app
    spec:
      containers:
        - name: health-card-app
          image: health-card-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
